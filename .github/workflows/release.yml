name: Release

# Publishes to PyPI when you push a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Requires a repository secret PYPI_API_TOKEN (a PyPI API token, value starts with "pypi-").
# Add it at: Settings → Secrets and variables → Actions → New repository secret.

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Check artifacts
        run: |
          pip install twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
