name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (editable, with dev deps)
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q      # core honesty: no sympy installed — CAS tests skip, guard tests run
      - name: CAS extra — prove the symbolic fallback upgrades a step (3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          pip install -e ".[cas]"
          pytest -q python/tests/test_cas.py   # now nothing skips; asserts method == "cas", steps_checked >= 1

  conformance:
    # Python↔JS parity: regenerate the corpus from the Python reference (fail on drift),
    # then assert the JS port reproduces it. Keeps the two implementations in lockstep.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -e ".[dev]"
      - name: Regenerate conformance corpus (must be committed / no drift)
        run: |
          python python/tools/gen_conformance.py
          git diff --exit-code spec/conformance || (echo "conformance corpus is stale — run gen_conformance.py" && exit 1)
      - name: Regenerate mutation corpus (must be committed / no drift)
        run: |
          python python/tools/gen_mutations.py
          git diff --exit-code spec/mutations || (echo "mutation corpus is stale — run gen_mutations.py" && exit 1)
      - name: Mutation harness tests
        run: pytest python/tests/test_mutations.py -q
      - name: Mutation bar (>=80% caught, <5% false-positive)
        run: python python/tools/mutation_report.py --assert-bar
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm, cache-dependency-path: js/package-lock.json }
      - name: JS conformance
        working-directory: js
        run: npm ci && npm test
