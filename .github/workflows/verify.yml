name: verify-mtph

# Run `mtph verify` on changed .mtph problem files: surface silent failures that `validate`
# can't (doubled backslashes, dangling \ref, undefined figure anchors, plot domain gaps) and
# block the merge on any error. Findings go to the run summary and a sticky PR comment.

on:
  pull_request:
    paths: ["**.mtph"]
  push:
    branches: [main]
    paths: ["**.mtph"]

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base commit to diff against

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mtph
        run: pip install -e .

      - name: Collect changed .mtph files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
          else
            base='${{ github.event.before }}'
          fi
          files=$(git diff --name-only --diff-filter=ACMR "$base" HEAD -- '*.mtph' 2>/dev/null || true)
          [ -z "$files" ] && files=$(git ls-files '*.mtph')
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Verify
        id: verify
        run: python .github/scripts/verify_changed.py ${{ steps.changed.outputs.files }}

      - name: Sticky PR comment
        if: ${{ always() && github.event_name == 'pull_request' && hashFiles('verify-report.md') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          MARKER='<!-- mtph-verify -->'
          BODY="$(printf '%s\n%s' "$MARKER" "$(cat verify-report.md)")"
          ID=$(gh api "repos/$REPO/issues/$PR/comments" \
                 --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n1)
          if [ -n "$ID" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$ID" -f body="$BODY" >/dev/null
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -f body="$BODY" >/dev/null
          fi
